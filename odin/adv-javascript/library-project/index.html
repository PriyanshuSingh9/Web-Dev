<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Library</h1>

    <div class="container">
        <div class="add">
            <form action="" class="add-form">
                <h2>Add Books</h2>
                <div>
                    <label for="title">Book Title :</label>
                    <input type="text" class="details" id="title">
                </div>
                <div>
                    <label for="author">Author :</label>
                    <input type="text" class="details" id="author">
                </div>
                <div>
                    <label for="pages">Total Pages :</label>
                    <input type="text" class="details" id="pages">
                </div>
                <div>
                    <label for="status">Reading status :</label>
                    <input type="text" class="details" id="status">
                </div>
                <button class="addbtn">Add</button>
            </form>

        </div>
        <div class="content">
            <ul class="library">
            </ul>
        </div>
        <footer></footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
