<!doctype html>
<html lang="en">
<!--Lang is an attribute used here to tell the browser that the website is in the english language-->
<head>
    <!--Head tag is used to modify the header information of the file and file configurations such as encoding-->
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Bookmark Manager</title>
</head>
<body>
<!--Body tag is used to display the contents of the website-->

<h1>My Bookmarks</h1>
<!--There are 6 heading tags 1 through 6 going smaller each step-->

<p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Laborum, temporibus.</p>
<!--Paragraph tag-->

<h2>Primary Bookmark</h2>
<!--Anchor tag is used to embed links here-->
<!--target blank is used to make site open in new tab.-->
<!--We used the paragraph tag here to make sure all sites are diplayed properly else they are displayed one after the other-->
<!--List tag can be used to do this more efficiently-->
<p><a href="https://www.google.com" target="_blank">Google</a></p>
<p><a href="https://youtube.com/" target="_blank">YouTube</a></p>
<p><a href="https://music.youtube.com/" target="_blank">YouTube Music</a></p>

<h2>Primary Bookmark</h2>
<p><a href="https://keep.google.com/" target="_blank">Google Keep</a></p>

</body>
</html>
