<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
</head>

<body>
    <!--Image tag has two default attributes src and alt
alt displays name given in a case that image is not displayed due to some error
width/height are used to change image dimensions only one can be defined and other is chosen with help of aspect ratio-->
    <img width="768" src="roronoa-zoro-green-5120x2880-18358.jpg" alt="Roronoa Zoro">

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Rohan</td>
                <td>18</td>
            </tr>
            <tr>
                <td>Sumit</td>
                <td>17</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Total Students</td>
                <td>2</td>
            </tr>
        </tfoot>

    </table>

    <ol start="1">
        <!--The start attribute specifies the starting number for the list.-->
        <!--Uppercase Roman Numerals: Use type="I"-->
        <!--Lowercase Roman Numerals: Use type="i"-->
        <!--Numerals: Use type="1" (This is the default) -->
        <!--Lowercase Alphabetical Letters: Use type="a"-->
        <!--Uppercase Alphabetical Letters: Use type="A"-->
        <li>Monkey D. Luffy</li>
        <li>Roronoa Zoro</li>
        <li>Sanji</li>
    </ol>
    <ul>
        <li>Monkey D. Luffy</li>
        <li>Roronoa Zoro</li>
        <li>Sanji</li>
    </ul>
    <dl>
        <dt>Captain</dt>
        <dd>Monkey D. Luffy</dd>
        <dt>Right Hand</dt>
        <dd>Roronoa Zoro</dd>
        <dt>Left Hand</dt>
        <dd>Sanji</dd>
    </dl>

</body>

</html>
