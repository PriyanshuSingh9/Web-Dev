<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify-Web Music Player: Music for everyone</title>
    <link rel="icon" type="image/x-icon" href="assets/Primary_Logo_Green_RGB.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="nav-left">
            <img src="assets/Primary_Logo_White_CMYK.svg" class="logo" alt="logo">
        </div>
        <div class="nav-bar">
            <div class="nav-center">
                <ul class="nav-list">
                    <li class="nav-item home">
                        <img src="assets/icons8-home-48.png" alt="home" class="home-icon">
                    </li>
                    <li class="nav-item search">
                        <svg class="search-icon" viewBox="0 0 24 24"><path d="M10 2a8 8 0 0 1 6.32 12.9l5.39 5.39-1.42 1.42-5.39-5.39A8 8 0 1 1 10 2zm0 2a6 6 0 1 0 0 12a6 6 0 0 0 0-12z"/></svg>
                        <input type="text" placeholder="What do you want to play?">
                        <div class="go">Search</div>
                    </li>
                </ul>
            </div>
            <div class="nav-right">
                <ul class="nav-list">
                    <li class="nav-item premium">Explore Premium</li>
                    <li class="nav-item install">
                        <img src="assets/icons8-scroll-down-32.png" class="install-icon" alt="">
                        Install App
                    </li>
                    <li class="nav-item bell">
                        <img src="assets/icons8-bell-48.png" alt="">
                    </li>
                    <li class="nav-item friends">
                        <img src="assets/Screenshot_2025-11-08_15-29-17.png" class="friends-icon" alt="">
                    </li>
                    <li class="nav-item user">
                        <img src="assets/Screenshot_2025-11-08_15-33-42.png" alt="" class="user-icon">
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <div class="main">
        <div class="library">

        </div>
        <div class="music">
            <div class="audio-type">
                <div>All</div>
                <div>Music</div>
                <div>Podcasts</div>
            </div>
            <div class="songs">
                
            </div>
        </div>
    </div>
    <div class="playbar">
        <div class="controls">
            <div class="action prev">
                <img src="assets/icons8-forward-50 (1).png" alt="">
            </div>
            <div class="action play">
                <img src="assets/icons8-play-30.png" alt="">
            </div>
            <div class="action next">
                <img src="assets/icons8-forward-50.png" alt="">
            </div>
        </div>
        <div class="seekbar">
            <div class="seekbar-fill"></div>
            <div class="seekbar-thumb"></div>
        </div>
        <div class="time-display">00:00 / 00:00</div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
