<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div id="name">Rock-Paper-Scissors</div>
        <img src="assets/rock-paper-scissors.png" alt="logo" id="logo">
    </header>
    <div id="container">
        <div class="control">
            <div class="userCount"><ul>
                    <li>Wins:</li>
                    <li class="userCounter"></li>
                </ul>
            </div>

            <div class="player">
                <div class="nameUser">USER</div>
                <div class="userMoves">
                    <div class="move rock">
                        <img src="assets/hand.png" alt="rock">
                    </div>
                    <div class="move paper">
                        <img src="assets/hand-paper.png" alt="">
                    </div>
                    <div class="move scissor">
                        <img src="assets/scissors.png" alt="">
                    </div>
                </div>
            </div>
        </div>

        <div id="battle-board">
            <div id="result">-------</div>
            <div id="vs">V/S</div>
        </div>

        <div class="control">
            <div class="compCount">
                <ul>
                    <li>Wins:</li>
                    <li class="compCounter"></li>
                </ul>
            </div>

            <div class="player">
                <div class="nameComp">COMPUTER</div>
                <div class="computerMoves">
                    <div class="move rock">
                        <img src="assets/hand.png" alt="rock">
                    </div>
                    <div class="move paper">
                        <img src="assets/hand-paper.png" alt="">
                    </div>
                    <div class="move scissor">
                        <img src="assets/scissors.png" alt="">
                    </div>
                </div>
            </div>
        </div>
    </div>


    <footer>© 2nd November 2025</footer>

    <script src="scripts_gui.js"></script>
</body>

</html>
