<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/view-dashboard.svg" type="image/x-icon">
</head>

<body>
    <div class="container">
        <header>
            <div class="welcome">
                <div>
                    <img src="assets/pfp.jpeg" class="nav-pfp" alt="">
                </div>
                <div>
                    <h3>Hi there,</h3>
                    <h2>Priyanshu Singh (@bhondu)</h2>
                </div>
            </div>
            <div class="search">
                <img src="assets/magnify.svg" class="nav-img" alt="">
                <input type="text" placeholder="Search">
            </div>
        </header>
        <div class="sidebar">
            <div class="menu-one">
                <img src="assets/view-dashboard.svg" class="menu-img" alt="dashboard-icon">
                Dashboard
            </div>
            <div class="menu-two">
                <ul>
                    <li>
                        <img src="assets/home.svg" class="menu-img" alt="">Home
                    </li>
                    <li>
                        <img src="assets/google-spreadsheet.svg" class="menu-img" alt="">Profile
                    </li>
                    <li>
                        <img src="assets/message.svg" class="menu-img" alt="">Messages
                    </li>
                    <li>
                        <img src="assets/clock-time-eight.svg" class="menu-img" alt="">History
                    </li>
                    <li>
                        <img src="assets/checkbox-marked-circle-auto-outline.svg" class="menu-img" alt="">Tasks
                    </li>
                    <li>
                        <img src="assets/account-group.svg" class="menu-img" alt="">Communities
                    </li>
                </ul>
            </div>
        </div>
        <div class="main">
            <ul class="cards">
                <li class="quote"></li>
                <li class="quote"></li>
                <li class="quote"></li>
                <li class="quote"></li>
                <li class="quote"></li>
                <li class="quote"></li>
            </ul>

            <ul class="author-list">
                <li class="author"></li>
                <li class="author"></li>
                <li class="author"></li>
                <li class="author"></li>
            </ul>

            <ul class="announcement-list">
                <li class="announcement"></li>
                <li class="announcement"></li>
                <li class="announcement"></li>
            </ul>
        </div>
    </div>
</body>

</html>
