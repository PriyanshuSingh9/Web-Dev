<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div id="name">Rock-Paper-Scissors</div>
        <img src="rock-paper-scissors_6851361.png" alt="logo" id="logo">
    </header>
    <div id="container">
        <div class="control">
            <div class="count">Wins:</div>

            <div class="player">
                <div class="name"></div>
                <div class="moves">
                    <div class="move rock"></div>
                    <div class="move paper"></div>
                    <div class="move scissor"></div>
                </div>
            </div>
        </div>

        <div id="battle-board">
            <div class="result"></div>
            <div id="vs"></div>
        </div>

        <div class="control">
            <div class="count">Wins:</div>

            <div class="player">
                <div class="name"></div>
                <div class="moves">
                    <div class="move rock"></div>
                    <div class="move paper"></div>
                    <div class="move scissor"></div>
                </div>
            </div>
        </div>
    </div>


    <footer>© 2nd November 2025</footer>

    <!-- <script src="scripts.js"></script> -->
</body>

</html>
